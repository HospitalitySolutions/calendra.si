services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: calendradb
      POSTGRES_USER: calendra
      POSTGRES_PASSWORD: calendra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendra -d calendradb"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 4000
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/calendradb
      SPRING_DATASOURCE_USERNAME: calendra
      SPRING_DATASOURCE_PASSWORD: calendra
      APP_JWT_SECRET: local-dev-only-change-me-to-a-long-random-string
      APP_AUTH_FRONTEND_URL: http://localhost:3000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
      APP_SERVER_INCLUDE_MESSAGE: always
      APP_SEED_ENABLED: "true"
      APP_SEED_DEMO_TENANTS_ENABLED: "true"
      APP_SEED_SUPER_ADMIN_ENABLED: "true"
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_WEB_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"

volumes:
  postgres_data_local:
