services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    depends_on:
      - backend
    ports:
      - "3000:80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: production
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 4000
    ports:
      - "4000:4000"
