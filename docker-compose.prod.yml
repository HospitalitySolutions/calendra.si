services:
  proxy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.production:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-calendradb}
      POSTGRES_USER: ${POSTGRES_USER:-calendra}
      # Intentionally no default: load from AWS Secrets Manager before starting Compose.
      # Recommended: scripts/docker-compose-with-aws-secrets.sh production deploy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be loaded from AWS Secrets Manager for production}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calendra} -d ${POSTGRES_DB:-calendradb}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    # Images are built by GitHub Actions and published to GHCR. EC2 only pulls them.
    image: ${CALENDRA_IMAGE_REGISTRY:-ghcr.io/hospitalitysolutions}/calendra-backend:${CALENDRA_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: production
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 4000
      APP_JWT_EXPIRATION_MS: 86400000
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_DEFAULT_REGION: ${AWS_REGION:-eu-central-1}
      AWS_PRODUCTION_SECRET_ID: ${AWS_PRODUCTION_SECRET_ID:-calendra-app}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_RATE_LIMIT_BACKEND: ${APP_RATE_LIMIT_BACKEND:-redis}
      APP_WIDGET_RATE_LIMIT_BACKEND: ${APP_WIDGET_RATE_LIMIT_BACKEND:-redis}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=30 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError}
    mem_limit: ${BACKEND_MEMORY_LIMIT:-2g}
    cpus: ${BACKEND_CPU_LIMIT:-2.0}
    stop_grace_period: 45s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS http://localhost:4000/api/actuator/health/readiness | grep -q '"status":"UP"'
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  frontend:
    # Built and published by the same GitHub Actions run as the backend image.
    image: ${CALENDRA_IMAGE_REGISTRY:-ghcr.io/hospitalitysolutions}/calendra-frontend:${CALENDRA_IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: ${FRONTEND_MEMORY_LIMIT:-512m}
    cpus: ${FRONTEND_CPU_LIMIT:-0.5}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
