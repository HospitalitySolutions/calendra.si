services:
  proxy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.production:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - frontend
      - backend

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-calendradb}
      POSTGRES_USER: ${POSTGRES_USER:-calendra}
      # Intentionally no default: load from AWS Secrets Manager before starting compose.
      # Recommended: scripts/docker-compose-with-aws-secrets.sh production up -d --build
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be loaded from AWS Secrets Manager for production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calendra} -d ${POSTGRES_DB:-calendradb}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: production
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 4000
      APP_JWT_EXPIRATION_MS: 86400000
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_DEFAULT_REGION: ${AWS_REGION:-eu-central-1}
      AWS_PRODUCTION_SECRET_ID: ${AWS_PRODUCTION_SECRET_ID:-calendra-app}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_RATE_LIMIT_BACKEND: ${APP_RATE_LIMIT_BACKEND:-redis}
      APP_WIDGET_RATE_LIMIT_BACKEND: ${APP_WIDGET_RATE_LIMIT_BACKEND:-redis}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        BUILD_SCRIPT: build:production
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
