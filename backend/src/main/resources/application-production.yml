# Profile: production
# JSON secret "calendra/production" — same flat keys as staging (including AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
# AWS_REGION, and optional APP_INVOICE_S3_* for invoice PDFs).
#
# Lightsail: include AWS_* in Secrets Manager for Spring; bootstrap IAM user on the host (or container env) must still
# be able to call secretsmanager:GetSecretValue for this secret before the JSON is loaded (see application-staging.yml).
server:
  forward-headers-strategy: framework
spring:
  config:
    # Override with AWS_PRODUCTION_SECRET_ID to force exact lookup (recommended: full ARN).
    import: optional:aws-secretsmanager:${AWS_PRODUCTION_SECRET_ID:calendra/production},optional:aws-secretsmanager:/${AWS_PRODUCTION_SECRET_ID:calendra/production}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-central-1}
app:
  auth:
    frontend-url: ${APP_AUTH_FRONTEND_URL:https://app.calendra.si}
