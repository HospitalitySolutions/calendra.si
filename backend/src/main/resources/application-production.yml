server:
  forward-headers-strategy: framework
  error:
    include-message: never

spring:
  config:
    import: optional:aws-secretsmanager:${AWS_PRODUCTION_SECRET_ID:calendra/production},optional:aws-secretsmanager:/${AWS_PRODUCTION_SECRET_ID:calendra/production}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-central-1}

app:
  auth:
    frontend-url: ${APP_AUTH_FRONTEND_URL:https://app.calendra.si}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://app.calendra.si}
  invoice-s3:
    enabled: ${APP_INVOICE_S3_ENABLED:true}
    bucket: ${APP_INVOICE_S3_BUCKET:calendra-s3-app-1-345362761828-eu-central-1-an}
    prefix: ${APP_INVOICE_S3_PREFIX:calendra}
  seed:
    enabled: false
    demo-tenants-enabled: false
    super-admin-enabled: false
