# Profile: production
# JSON secret "calendra-app" — same flat keys as staging (including AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
# AWS_REGION). For fiscalized invoice PDF archival to S3 after successful FURS send, set all of:
#   APP_INVOICE_S3_ENABLED=true
#   APP_INVOICE_S3_BUCKET=<production-bucket-name>
#   optional: APP_INVOICE_S3_PREFIX=invoices
# Without these, archival is skipped (no error to the client). Archived PDF is BillPdfService output (GET .../pdf), not the separate FolioPdfService document (GET .../folio-pdf).
#
# Lightsail: include AWS_* in Secrets Manager for Spring; bootstrap IAM user on the host (or container env) must still
# be able to call secretsmanager:GetSecretValue for this secret before the JSON is loaded (see application-staging.yml).
server:
  forward-headers-strategy: framework
spring:
  config:
    # Override with AWS_PRODUCTION_SECRET_ID to force exact lookup (recommended: full ARN).
    import: optional:aws-secretsmanager:${AWS_PRODUCTION_SECRET_ID:calendra-app},optional:aws-secretsmanager:/${AWS_PRODUCTION_SECRET_ID:calendra-app}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-central-1}
app:
  widget:
    turnstile:
      site-key: ${APP_WIDGET_TURNSTILE_SITE_KEY:}
      secret-key: ${APP_WIDGET_TURNSTILE_SECRET_KEY:}
  auth:
    frontend-url: ${APP_AUTH_FRONTEND_URL:https://app.calendra.si}
    cookie:
      secure: ${APP_AUTH_COOKIE_SECURE:true}
      same-site: ${APP_AUTH_COOKIE_SAME_SITE:Lax}
      domain: ${APP_AUTH_COOKIE_DOMAIN:}
  webauthn:
    rp-id: ${APP_WEBAUTHN_RP_ID:app.calendra.si}
    allowed-origins: ${APP_WEBAUTHN_ALLOWED_ORIGINS:https://app.calendra.si}

