# Profile: production
# JSON secret "calendra-app" — same flat keys as staging (including AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
# AWS_REGION). For fiscalized invoice PDF archival to S3 after successful FURS send, set all of:
#   APP_INVOICE_S3_ENABLED=true
#   APP_INVOICE_S3_BUCKET=<production-bucket-name>
#   optional: APP_INVOICE_S3_PREFIX=invoices
# Without these, archival is skipped (no error to the client). Archived PDF uses the folio-layout based invoice renderer shared by GET .../pdf and GET .../folio-pdf.
#
# Lightsail: include AWS_* in Secrets Manager for Spring; bootstrap IAM user on the host (or container env) must still
# be able to call secretsmanager:GetSecretValue for this secret before the JSON is loaded (see application-staging.yml).
server:
  forward-headers-strategy: framework
  shutdown: graceful
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:200}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:200}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:10000}
    connection-timeout: ${SERVER_TOMCAT_CONNECTION_TIMEOUT:5s}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
spring:
  lifecycle:
    timeout-per-shutdown-phase: ${SPRING_LIFECYCLE_SHUTDOWN_TIMEOUT:30s}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    validate-on-migrate: true
    clean-disabled: true
  datasource:
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:5000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:3000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1500000}
      keepalive-time: ${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:300000}
  jpa:
    hibernate:
      ddl-auto: validate
  config:
    # Override with AWS_PRODUCTION_SECRET_ID to force exact lookup (recommended: full ARN).
    import: optional:aws-secretsmanager:${AWS_PRODUCTION_SECRET_ID:calendra-app}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-central-1}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:2s}
app:
  public-base-url: ${APP_PUBLIC_BASE_URL:}
  bootstrap:
    superadmin:
      enabled: ${APP_BOOTSTRAP_SUPERADMIN_ENABLED:false}
      email: ${APP_BOOTSTRAP_SUPERADMIN_EMAIL:}
      password: ${APP_BOOTSTRAP_SUPERADMIN_PASSWORD:}
      first-name: ${APP_BOOTSTRAP_SUPERADMIN_FIRST_NAME:Platform}
      last-name: ${APP_BOOTSTRAP_SUPERADMIN_LAST_NAME:Admin}
      platform-company-name: ${APP_BOOTSTRAP_SUPERADMIN_COMPANY_NAME:Platform Admin}
  settings:
    # Must be provided by AWS Secrets Manager/env in production. Backend fails startup if blank/default/too short.
    encryption-key: ${APP_SETTINGS_ENCRYPTION_KEY:}
  google-calendar:
    # Dedicated token key is required in production when Google Calendar is enabled; no APP_JWT_SECRET fallback here.
    token-encryption-secret: ${GOOGLE_CALENDAR_TOKEN_ENCRYPTION_SECRET:}
  security:
    rate-limit:
      backend: ${APP_RATE_LIMIT_BACKEND:redis}
  widget:
    security:
      require-allowed-origin: ${APP_WIDGET_REQUIRE_ALLOWED_ORIGIN:true}
      trust-referer-when-origin-missing: ${APP_WIDGET_TRUST_REFERER_WHEN_ORIGIN_MISSING:false}
      allowed-origins: ${APP_WIDGET_ALLOWED_ORIGINS:https://app.calendra.si,https://calendra.si,https://www.calendra.si}
      rate-limit-backend: ${APP_WIDGET_RATE_LIMIT_BACKEND:redis}
      general-requests-per-minute-per-ip: ${APP_WIDGET_GENERAL_REQUESTS_PER_MINUTE_PER_IP:60}
      general-requests-per-minute-per-tenant: ${APP_WIDGET_GENERAL_REQUESTS_PER_MINUTE_PER_TENANT:600}
      bookings-per-minute-per-ip: ${APP_WIDGET_BOOKINGS_PER_MINUTE_PER_IP:5}
      bookings-per-minute-per-tenant: ${APP_WIDGET_BOOKINGS_PER_MINUTE_PER_TENANT:60}
    turnstile:
      site-key: ${APP_WIDGET_TURNSTILE_SITE_KEY:}
      secret-key: ${APP_WIDGET_TURNSTILE_SECRET_KEY:}
      required-for-public-actions: ${APP_WIDGET_TURNSTILE_REQUIRED_FOR_PUBLIC_ACTIONS:true}
  auth:
    frontend-url: ${APP_AUTH_FRONTEND_URL:${APP_PUBLIC_BASE_URL:https://app.calendra.si}}
    cookie:
      secure: ${APP_AUTH_COOKIE_SECURE:true}
      same-site: ${APP_AUTH_COOKIE_SAME_SITE:Lax}
      domain: ${APP_AUTH_COOKIE_DOMAIN:}
  webauthn:
    rp-id: ${APP_WEBAUTHN_RP_ID:app.calendra.si}
    allowed-origins: ${APP_WEBAUTHN_ALLOWED_ORIGINS:https://app.calendra.si}
  realtime:
    redis:
      enabled: ${APP_REALTIME_REDIS_ENABLED:true}
      channel: ${APP_REALTIME_REDIS_CHANNEL:calendra:session-bookings:events}
  waitlist:
    expiry-batch-size: ${APP_WAITLIST_EXPIRY_BATCH_SIZE:100}
    expiry-lock-at-most: ${APP_WAITLIST_EXPIRY_LOCK_AT_MOST:PT10M}
  inbox:
    scheduled-dispatch-batch-size: ${APP_INBOX_SCHEDULED_DISPATCH_BATCH_SIZE:100}
    scheduled-dispatch-lock-at-most: ${APP_INBOX_SCHEDULED_DISPATCH_LOCK_AT_MOST:PT30M}
  meetings:
    provisioning:
      batch-size: ${APP_MEETING_PROVISIONING_BATCH_SIZE:50}
      max-attempts: ${APP_MEETING_PROVISIONING_MAX_ATTEMPTS:6}
      processing-lease: ${APP_MEETING_PROVISIONING_PROCESSING_LEASE:PT5M}
      retry-base: ${APP_MEETING_PROVISIONING_RETRY_BASE:PT30S}
      poll-ms: ${APP_MEETING_PROVISIONING_POLL_MS:10000}
      lock-at-most: ${APP_MEETING_PROVISIONING_LOCK_AT_MOST:PT10M}


management:
  endpoints:
    web:
      # Keep Prometheus behind private networking/authentication. Override to health,info
      # when no private scraper is configured.
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db,redis
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:false}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.20}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.example.app: ${LOG_LEVEL_APP:INFO}
