# No credentials or API secrets belong in this file.
# — Local: copy backend/env.local.example → backend/.env.local (loaded automatically before Spring starts).
# — Docker local: docker-compose.local.yml injects local DB + JWT settings directly and does not require AWS.
# — Staging / production: AWS Secrets Manager (application-staging.yml / application-production.yml).
spring:
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-central-1}
      s3:
        enabled: ${APP_INVOICE_S3_ENABLED:false}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/calendradb}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${SPRING_MAIL_HOST:email-smtp.eu-north-1.amazonaws.com}
    port: ${SPRING_MAIL_PORT:465}
    test-connection: false
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${SPRING_MAIL_SMTP_SSL_ENABLE:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
server:
  port: 4000
  address: 0.0.0.0
  error:
    include-message: ${APP_SERVER_INCLUDE_MESSAGE:always}

management:
  health:
    mail:
      enabled: false

app:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  reminders:
    enabled: ${APP_REMINDERS_ENABLED:true}
    timezone: ${APP_REMINDERS_TIMEZONE:Europe/Ljubljana}
  mail:
    from: ${APP_MAIL_FROM:}
  auth:
    frontend-url: ${APP_AUTH_FRONTEND_URL:http://localhost:3000}
  infobip:
    base-url: ${INFOBIP_BASE_URL:https://api.infobip.com}
    api-key: ${INFOBIP_API_KEY:}
    sender: ${INFOBIP_SENDER:}
  zoom:
    client-id: ${ZOOM_CLIENT_ID:}
    client-secret: ${ZOOM_CLIENT_SECRET:}
    redirect-uri: ${ZOOM_REDIRECT_URI:http://localhost:4000/api/zoom/callback}
    frontend-url: ${ZOOM_FRONTEND_URL:http://localhost:3000}
  google-meet:
    client-id: ${GOOGLE_MEET_CLIENT_ID:}
    client-secret: ${GOOGLE_MEET_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_MEET_REDIRECT_URI:https://staging.calendra.si/api/google/callback}
    frontend-url: ${GOOGLE_MEET_FRONTEND_URL:https://staging.calendra.si}
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  fiscal:
    trust-certificate-locations: ${APP_FISCAL_TRUST_CERTIFICATE_LOCATIONS:classpath:fiscal-certs/si-trust-root.crt,classpath:fiscal-certs/sigov-ca2.xcert.crt,classpath:fiscal-certs/blagajne-test.fu.gov.si.cer}
  invoice-s3:
    enabled: ${APP_INVOICE_S3_ENABLED:false}
    bucket: ${APP_INVOICE_S3_BUCKET:}
    prefix: ${APP_INVOICE_S3_PREFIX:calendra}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    base-url: ${STRIPE_BASE_URL:https://api.stripe.com}
    currency: ${STRIPE_CURRENCY:eur}
    success-url: ${STRIPE_SUCCESS_URL:}
    cancel-url: ${STRIPE_CANCEL_URL:}
    webhook-url: ${STRIPE_WEBHOOK_URL:}
    eu-bank-transfer-country: ${STRIPE_EU_BANK_TRANSFER_COUNTRY:NL}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
    demo-tenants-enabled: ${APP_SEED_DEMO_TENANTS_ENABLED:true}
    super-admin-enabled: ${APP_SEED_SUPER_ADMIN_ENABLED:true}
    super-admin-email: ${APP_SEED_SUPER_ADMIN_EMAIL:dmirc@hosp-it.eu}
    super-admin-password: ${APP_SEED_SUPER_ADMIN_PASSWORD:Admin123!}
    demo-admin-password: ${APP_SEED_DEMO_ADMIN_PASSWORD:Admin123!}
