server:
  forward-headers-strategy: framework
  error:
    include-message: ${APP_SERVER_INCLUDE_MESSAGE:always}

spring:
  config:
    import: optional:aws-secretsmanager:${AWS_STAGING_SECRET_ID:arn:aws:secretsmanager:eu-central-1:345362761828:secret:calendra/staging-2jqRIf}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-central-1}

app:
  auth:
    frontend-url: ${APP_AUTH_FRONTEND_URL:https://staging.calendra.si}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://staging.calendra.si,http://localhost:3000}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
    demo-tenants-enabled: ${APP_SEED_DEMO_TENANTS_ENABLED:true}
    super-admin-enabled: ${APP_SEED_SUPER_ADMIN_ENABLED:true}
