# Profile: staging — run with: spring.profiles.active=staging
# Behind Caddy (TLS termination): trust X-Forwarded-Proto so OAuth redirect_uri uses https, not http.
server:
  forward-headers-strategy: framework
# Loads configuration from AWS Secrets Manager (see spring.config.import below).
# Secret JSON: flat keys only (e.g. SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD,
# APP_JWT_SECRET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION,
# APP_INVOICE_S3_ENABLED, APP_INVOICE_S3_BUCKET, APP_INVOICE_S3_PREFIX, …).
# See backend/env.local.example for the full list used locally (same names work in AWS).
#
# Amazon Lightsail (no instance IAM role): put AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION in the secret
# for Spring-managed clients (S3, etc.). You still need bootstrap credentials on the host (systemd EnvironmentFile,
# Docker env, or export before java -jar) with at least secretsmanager:GetSecretValue on this secret — otherwise the
# JVM cannot fetch the secret on first start. Use a narrow IAM user; optional duplicate keys in SM for one place to edit.
spring:
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
  jpa:
    hibernate:
      ddl-auto: validate
  config:
    # Friendly name or full ARN (see AWS console) both work.
    # Override with AWS_STAGING_SECRET_ID to force exact lookup (recommended: full ARN).
    import: optional:aws-secretsmanager:${AWS_STAGING_SECRET_ID:calendra-staging},optional:aws-secretsmanager:/${AWS_STAGING_SECRET_ID:calendra-staging}
  # Google login: put GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in the calendra/staging JSON secret.
  # Apple login: put APPLE_CLIENT_ID, APPLE_TEAM_ID, APPLE_KEY_ID, and APPLE_PRIVATE_KEY or APPLE_PRIVATE_KEY_BASE64 in the secret.
  # Spring does not map those flat names to OAuth2 automatically; GoogleOAuthClientRegistrationConfig does.
  # Optional: GOOGLE_OAUTH_REDIRECT_URI / APPLE_OAUTH_REDIRECT_URI (default {baseUrl}/login/oauth2/code/{registrationId}).
  # Or use full Spring keys in the secret instead: spring.security.oauth2.client.registration.google.client-id, etc.
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-central-1}
app:
  public-base-url: ${APP_PUBLIC_BASE_URL:}
  demo-booking-public-base-url: ${APP_DEMO_BOOKING_PUBLIC_BASE_URL:https://calendra.si}
  demo-booking-management-base-url: ${APP_DEMO_BOOKING_MANAGEMENT_BASE_URL:${APP_AUTH_FRONTEND_URL:https://app.calendra.si}}
  bootstrap:
    superadmin:
      enabled: ${APP_BOOTSTRAP_SUPERADMIN_ENABLED:false}
      email: ${APP_BOOTSTRAP_SUPERADMIN_EMAIL:}
      password: ${APP_BOOTSTRAP_SUPERADMIN_PASSWORD:}
      first-name: ${APP_BOOTSTRAP_SUPERADMIN_FIRST_NAME:Platform}
      last-name: ${APP_BOOTSTRAP_SUPERADMIN_LAST_NAME:Admin}
      platform-company-name: ${APP_BOOTSTRAP_SUPERADMIN_COMPANY_NAME:Platform Admin}
  security:
    rate-limit:
      backend: ${APP_RATE_LIMIT_BACKEND:auto}
  auth:
    frontend-url: ${APP_AUTH_FRONTEND_URL:${APP_PUBLIC_BASE_URL:}}
  widget:
    security:
      require-allowed-origin: ${APP_WIDGET_REQUIRE_ALLOWED_ORIGIN:false}
      trust-referer-when-origin-missing: ${APP_WIDGET_TRUST_REFERER_WHEN_ORIGIN_MISSING:false}
      rate-limit-backend: ${APP_WIDGET_RATE_LIMIT_BACKEND:auto}
    turnstile:
      site-key: ${APP_WIDGET_TURNSTILE_SITE_KEY:}
      secret-key: ${APP_WIDGET_TURNSTILE_SECRET_KEY:}
      required-for-public-actions: ${APP_WIDGET_TURNSTILE_REQUIRED_FOR_PUBLIC_ACTIONS:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:true}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
