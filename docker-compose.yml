# This root compose file is intentionally a safety guard.
#
# Do NOT use `docker compose up` for Calendra production. The production stack must be
# started explicitly with:
#   scripts/docker-compose-with-aws-secrets.sh production up -d --build
# or, when the production environment variables are already exported:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Local development must be started explicitly with:
#   docker compose -f docker-compose.local.yml up -d --build
#
# Keeping this root file disabled prevents accidentally starting a production-profile
# stack with local/default database credentials or rebuilding the proxy/frontend/backend
# from the wrong compose file.
services:
  compose-usage-guard:
    image: busybox:1.36
    command:
      - sh
      - -c
      - |
        echo "This root docker-compose.yml is intentionally disabled."
        echo "Use docker-compose.local.yml for local development or docker-compose.prod.yml for production."
        exit 1
